[pytest]
testpaths = tests
python_files = test_*.py *_corpus.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests (requires API keys)
    adversarial: Adversarial corpus tests
    slow: Tests that take > 1 second
